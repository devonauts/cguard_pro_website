server {
    listen 80;
    server_name cguardpro.com www.cguardpro.com;

    root /var/www/website;
    index index.html;

    # Gzip compression
    gzip on;
    gzip_static on;
    gzip_types text/plain text/css application/javascript application/json image/svg+xml;
    gzip_comp_level 6;

    # Cache static assets aggressively (Astro puts hashed files in _assets/)
    location ^~ /_assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    location ~* \.(css|js|svg|woff2?|png|jpg|jpeg|gif|ico|webp)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    # Astro static site — try clean URL, then .html file, then 404
    location / {
        try_files $uri $uri/ $uri.html =404;
    }

    # Custom 404 page
    error_page 404 /404.html;
    location = /404.html {
        internal;
    }
}
